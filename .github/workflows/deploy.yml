name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  BUN_VERSION: "1.2"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install

      - name: 🗄️ Setup database
        run: |
          bun run db:generate
          bun run db:push
        env:
          DATABASE_URL: file:./db/test.db

      - name: 🔍 Lint
        run: bun run lint

      - name: 🏗️ Build
        run: bun run build
        env:
          DATABASE_URL: file:./db/test.db
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Install dependencies
        run: bun install

      - name: 🗄️ Setup database
        run: |
          bun run db:generate
          bun run db:push
        env:
          DATABASE_URL: file:./db/production.db

      - name: 🏗️ Build
        run: bun run build
        env:
          DATABASE_URL: file:./db/production.db
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

